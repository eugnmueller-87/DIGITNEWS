<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Aushang</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #f7f6f3;
        color: #2b2a27;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 15px;
        color: #6b6a66;
        max-width: 28ch;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!--
      Capacitor remote-URL fallback shell. The app normally loads the live site
      (capacitor.config.ts -> server.url). This screen shows ONLY when the live
      URL can't be reached (no connectivity at launch).
    -->
    <div class="wrap">
      <h1>Keine Verbindung</h1>
      <p>
        Aushang konnte nicht geladen werden. Bitte prüfe deine
        Internetverbindung und starte die App erneut.
      </p>
    </div>
  </body>
</html>
