# Supabase local/project config. Mirror the security-critical settings here so
# they are version-controlled and reviewable. The cloud project's dashboard must
# match these for Phase 1's guarantees to hold.
#
# Brief §5 hard rules: signups happen ONLY through our security-definer flows;
# the public signup endpoint is disabled.

project_id = "aushang"

[auth]
# Exact production origin(s) only. Add the prod domain before go-live.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
# Magic-link / OTP sessions.
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
# EMAIL + PASSWORD. Public signup stays OFF — accounts are created ONLY by the
# operator/admin invite flow (Brief §5). A provisioned user sets their first
# password via a one-time "recovery" link we email through Resend; thereafter
# they sign in with email+password (signInWithPassword).
enable_signup = false          # <-- public signup OFF. Onboarding is via our flows.
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
# Minimum password length is also enforced server-side in /set-password.
# In the dashboard: enable the Email provider's PASSWORD auth (Authentication →
# Providers → Email → "Enable Email provider" with password sign-in on), keep
# "Allow new users to sign up" OFF.

# IMPORTANT: the "Reset Password" / "Recovery" email template MUST deliver a
# token_hash to our callback with type=recovery, because the app verifies links
# with verifyOtp({ token_hash, type }). In the dashboard's recovery template use:
#   {{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=recovery
# (We send invite/reset emails ourselves via Resend, so the redirect target is
# set in code via generateLink options.redirectTo; this template note applies if
# you ever let Supabase send recovery mail directly.)

[auth.rate_limit]
# Tighten magic-link request volume (Brief §5, §11). These are conservative
# defaults; the app adds its own token-bucket in middleware on top.
email_sent = 10                # per hour per project (raise cautiously)

[db]
# Europe region is selected at project creation time in the dashboard
# (Ireland/Frankfurt) — not expressible here. Documented in README.
major_version = 15
